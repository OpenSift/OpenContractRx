name: CI

on:
  push:
  pull_request:

jobs:
  python-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Import check
        working-directory: apps/api
        run: |
          python -c "import opencontractrx_api; print('ok')"

  python-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Worker
        working-directory: apps/worker
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Import check
        working-directory: apps/worker
        run: |
          python -c "import opencontractrx_worker; print('ok')"

  node-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Build
        working-directory: apps/web
        run: npm run build